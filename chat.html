<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="format-detection" content="telephone=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="white"/>
<title>Web Robot Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;font-size:14px;background:#f5f5f5}
.chat-container{display:flex;flex-direction:column;height:100%;max-width:800px;margin:0 auto;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.1)}
.chat-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff}
.chat-header h1{font-size:18px;font-weight:500}
.header-actions{display:flex;gap:8px}
.export-btn{padding:6px 12px;border:1px solid rgba(255,255,255,.3);border-radius:4px;background:rgba(255,255,255,.1);color:#fff;font-size:12px;cursor:pointer;transition:all .2s}
.export-btn:hover{background:rgba(255,255,255,.2)}
.chat-messages{flex:1;overflow-y:auto;padding:16px;background:#f9f9f9}
.message{display:flex;margin-bottom:16px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.message.user{flex-direction:row-reverse}
.message-avatar{width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
.message.user .message-avatar{background:#667eea;margin-left:12px}
.message.bot .message-avatar{background:#764ba2;margin-right:12px}
.message-content{max-width:70%}
.message-bubble{padding:10px 14px;border-radius:12px;word-wrap:break-word;line-height:1.5}
.message.user .message-bubble{background:#667eea;color:#fff;border-bottom-right-radius:4px}
.message.bot .message-bubble{background:#fff;color:#333;border-bottom-left-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.message-time{font-size:11px;color:#999;margin-top:4px;text-align:right}
.message.bot .message-time{text-align:left}
.chat-input{display:flex;padding:12px 16px;background:#fff;border-top:1px solid #eee;gap:8px}
.chat-input input{flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:20px;outline:0;font-size:14px;transition:border-color .2s}
.chat-input input:focus{border-color:#667eea}
.chat-input button{padding:10px 20px;border:none;border-radius:20px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;font-size:14px;cursor:pointer;transition:transform .2s,box-shadow .2s}
.chat-input button:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(102,126,234,.4)}
.chat-input button:active{transform:translateY(0)}
.typing{display:flex;align-items:center;gap:4px;padding:10px 14px}
.typing span{width:8px;height:8px;border-radius:50%;background:#999;animation:typing 1.4s infinite ease-in-out}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
.quick-replies{display:flex;flex-wrap:wrap;gap:8px;padding:0 16px 12px}
.quick-reply{padding:6px 12px;border:1px solid #667eea;border-radius:16px;background:#fff;color:#667eea;font-size:12px;cursor:pointer;transition:all .2s}
.quick-reply:hover{background:#667eea;color:#fff}
@media(max-width:600px){
.chat-container{max-width:100%;height:100vh}
.message-content{max-width:80%}
.chat-input button{padding:10px 16px}
}
</style>
</head>
<body>
<div class="chat-container">
<div class="chat-header">
<h1>Web Robot</h1>
<div class="header-actions">
<button class="export-btn" onclick="exportChat('txt')">导出TXT</button>
<button class="export-btn" onclick="exportChat('json')">导出JSON</button>
</div>
</div>
<div class="chat-messages" id="chatMessages"></div>
<div class="quick-replies" id="quickReplies"></div>
<div class="chat-input">
<input type="text" id="messageInput" placeholder="输入消息..." onkeypress="handleKeyPress(event)">
<button onclick="sendMessage()">发送</button>
</div>
</div>
<script>
var chatHistory = [];
var robotName = 'Robot';
var userName = '我';
var quickQuestions = [
'你好，介绍一下自己',
'你能做什么',
'今天天气怎么样',
'讲个笑话'
];
var botReplies = {
'你好':['你好呀！很高兴见到你~','嗨！有什么可以帮你的吗？','你好！我是你的智能助手'],
'介绍':['我是一个纯前端的智能聊天机器人，可以和你聊天、回答问题。','我是Web Robot，一个轻量级的聊天助手！'],
'能做什么':['我可以和你聊天、回答问题、讲笑话，还能导出聊天记录哦！','我的功能包括：智能对话、聊天记录导出（TXT/JSON格式）'],
'天气':['抱歉，我无法获取实时天气，建议你查看天气应用哦~','今天天气不错，适合写代码！'],
'笑话':['为什么程序员总是分不清万圣节和圣诞节？因为Oct 31 = Dec 25！','一个SQL语句走进酒吧，看到两张桌子，问道："我能JOIN你们吗？"'],
'谢谢':['不客气！','很高兴能帮到你！','随时为你服务~'],
'再见':['再见！下次再聊~','拜拜！期待下次见面','Goodbye！']
};
function init() {
loadHistory();
renderMessages();
renderQuickReplies();
if (chatHistory.length === 0) {
setTimeout(function() {
addBotMessage('你好！我是' + robotName + '，很高兴为你服务！');
}, 500);
}
}
function loadHistory() {
try {
var saved = localStorage.getItem('webRobotChatHistory');
if (saved) {
chatHistory = JSON.parse(saved);
}
} catch (e) {
chatHistory = [];
}
}
function saveHistory() {
try {
localStorage.setItem('webRobotChatHistory', JSON.stringify(chatHistory));
} catch (e) {}
}
function renderMessages() {
var container = document.getElementById('chatMessages');
container.innerHTML = '';
chatHistory.forEach(function(msg) {
appendMessageToDOM(msg, false);
});
scrollToBottom();
}
function renderQuickReplies() {
var container = document.getElementById('quickReplies');
container.innerHTML = '';
quickQuestions.forEach(function(q) {
var btn = document.createElement('button');
btn.className = 'quick-reply';
btn.textContent = q;
btn.onclick = function() {
sendQuickReply(q);
};
container.appendChild(btn);
});
}
function sendQuickReply(text) {
document.getElementById('messageInput').value = text;
sendMessage();
}
function sendMessage() {
var input = document.getElementById('messageInput');
var text = input.value.trim();
if (!text) return;
addUserMessage(text);
input.value = '';
showTyping();
setTimeout(function() {
hideTyping();
var reply = generateReply(text);
addBotMessage(reply);
}, 800 + Math.random() * 800);
}
function handleKeyPress(e) {
if (e.key === 'Enter') {
sendMessage();
}
}
function addUserMessage(text) {
var msg = {
type: 'user',
text: text,
time: new Date().toISOString()
};
chatHistory.push(msg);
saveHistory();
appendMessageToDOM(msg, true);
}
function addBotMessage(text) {
var msg = {
type: 'bot',
text: text,
time: new Date().toISOString()
};
chatHistory.push(msg);
saveHistory();
appendMessageToDOM(msg, true);
}
function appendMessageToDOM(msg, animate) {
var container = document.getElementById('chatMessages');
var div = document.createElement('div');
div.className = 'message ' + msg.type;
var avatar = document.createElement('div');
avatar.className = 'message-avatar';
avatar.textContent = msg.type === 'user' ? '👤' : '🤖';
var content = document.createElement('div');
content.className = 'message-content';
var bubble = document.createElement('div');
bubble.className = 'message-bubble';
bubble.textContent = msg.text;
var time = document.createElement('div');
time.className = 'message-time';
time.textContent = formatTime(msg.time);
content.appendChild(bubble);
content.appendChild(time);
div.appendChild(avatar);
div.appendChild(content);
container.appendChild(div);
scrollToBottom();
}
function formatTime(isoString) {
var d = new Date(isoString);
var h = d.getHours().toString().padStart(2, '0');
var m = d.getMinutes().toString().padStart(2, '0');
return h + ':' + m;
}
function scrollToBottom() {
var container = document.getElementById('chatMessages');
container.scrollTop = container.scrollHeight;
}
function showTyping() {
var container = document.getElementById('chatMessages');
var div = document.createElement('div');
div.className = 'message bot';
div.id = 'typingIndicator';
var avatar = document.createElement('div');
avatar.className = 'message-avatar';
avatar.textContent = '🤖';
var content = document.createElement('div');
content.className = 'message-content';
var bubble = document.createElement('div');
bubble.className = 'message-bubble typing';
bubble.innerHTML = '<span></span><span></span><span></span>';
content.appendChild(bubble);
div.appendChild(avatar);
div.appendChild(content);
container.appendChild(div);
scrollToBottom();
}
function hideTyping() {
var indicator = document.getElementById('typingIndicator');
if (indicator) indicator.remove();
}
function generateReply(text) {
text = text.toLowerCase();
for (var key in botReplies) {
if (text.indexOf(key) >= 0) {
var replies = botReplies[key];
return replies[Math.floor(Math.random() * replies.length)];
}
}
var defaultReplies = [
'嗯，这个我还在学习中~',
'有趣的问题！让我想想...',
'你可以试着问我其他问题哦',
'我理解你的意思，但这个问题有点难回答',
'换个话题聊聊吧？'
];
return defaultReplies[Math.floor(Math.random() * defaultReplies.length)];
}
function exportChat(format) {
if (chatHistory.length === 0) {
alert('暂无聊天记录可导出');
return;
}
var content, filename, mimeType;
if (format === 'txt') {
content = generateTxtContent();
filename = 'chat_' + getDateString() + '.txt';
mimeType = 'text/plain;charset=utf-8';
} else {
content = JSON.stringify({
exportTime: new Date().toISOString(),
totalMessages: chatHistory.length,
messages: chatHistory
}, null, 2);
filename = 'chat_' + getDateString() + '.json';
mimeType = 'application/json;charset=utf-8';
}
downloadFile(content, filename, mimeType);
}
function generateTxtContent() {
var lines = [];
lines.push('========== 聊天记录导出 ==========');
lines.push('导出时间: ' + new Date().toLocaleString());
lines.push('消息总数: ' + chatHistory.length);
lines.push('==================================');
lines.push('');
chatHistory.forEach(function(msg) {
var sender = msg.type === 'user' ? userName : robotName;
var time = formatTime(msg.time);
lines.push('[' + time + '] ' + sender + ':');
lines.push(msg.text);
lines.push('');
});
return lines.join('\n');
}
function getDateString() {
var d = new Date();
var y = d.getFullYear();
var m = (d.getMonth() + 1).toString().padStart(2, '0');
var day = d.getDate().toString().padStart(2, '0');
var h = d.getHours().toString().padStart(2, '0');
var min = d.getMinutes().toString().padStart(2, '0');
return y + m + day + '_' + h + min;
}
function downloadFile(content, filename, mimeType) {
var blob;
if (window.Blob) {
blob = new Blob([content], { type: mimeType });
} else {
var BlobBuilder = window.BlobBuilder || window.WebKitBlobBuilder || window.MozBlobBuilder;
var builder = new BlobBuilder();
builder.append(content);
blob = builder.getBlob(mimeType);
}
if (window.navigator && window.navigator.msSaveOrOpenBlob) {
window.navigator.msSaveOrOpenBlob(blob, filename);
} else {
var url = URL.createObjectURL(blob);
var a = document.createElement('a');
a.href = url;
a.download = filename;
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
URL.revokeObjectURL(url);
}
}
init();
</script>
</body>
</html>
